<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShieldStream | Secure Transmission</title>
    
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <div class="container">
        <h1>🛡️ ShieldStream</h1>
        <p class="subtitle">Secure Live Segmented Transmission</p>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('sender')">Broadcaster</button>
            <button class="tab-btn" onclick="showTab('receiver')">Receiver Node</button>
            <button class="tab-btn" onclick="showTab('scanner')">AI Scanner</button>
        </div>

        <section id="sender" class="tab-content active card">
            <h2>Broadcaster (Sender)</h2>
            <div id="drop-zone" class="drop-zone" onclick="document.getElementById('videoInput').click()">
                <span>Drag & Drop Match Video</span>
                <input type="file" id="videoInput" hidden>
            </div>
            <button onclick="handleUpload()" class="btn-primary">Encrypt & Send</button>
            <p id="senderMsg"></p>
        </section>

        <section id="receiver" class="tab-content card">
            <h2>Receiver Master Aggregator</h2>
            <div class="video-container">
                <video id="mainPlayer" controls width="100%">
                    <source src="/stream" type="video/mp4">
                </video>
            </div>
            <button onclick="refreshPlayer()" class="btn-primary" style="background:#10b981; margin-top:10px;">Refresh Feed</button>
            <p id="receiveStat" style="font-size:0.8em; color:#94a3b8; margin-top:10px;">Status: Ready</p>
        </section>

        <section id="scanner" class="tab-content card">
            <h2>🕵️ AI Anti-Piracy Scanner</h2>
            <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                <input type="text" id="susLink" placeholder="Enter suspicious link..." style="flex:1;">
                <button onclick="scanLink()" class="btn-primary" style="width:80px;">Scan</button>
            </div>
            <div id="pirateResults">
                <table style="width:100%; font-size: 0.8em; color: #cbd5e1;">
                    <thead>
                        <tr style="border-bottom: 1px solid #475569;">
                            <th>Status</th>
                            <th>Target URL</th>
                            <th>Server IP</th>
                        </tr>
                    </thead>
                    <tbody id="pirateTable"></tbody>
                </table>
            </div>
        </section>
    </div>
    <script src="static/script.js"></script>
</body>
</html>
